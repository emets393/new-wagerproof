name: Daily Tests

# Runs every day at 8am ET (1pm UTC)
on:
  schedule:
    - cron: '0 13 * * *'
  # Also runs on every push and PR so you catch issues immediately
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Lets you manually trigger it from the GitHub Actions tab
  workflow_dispatch:

jobs:
  web-tests:
    name: Web App Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Run web tests
        run: npm test

  mobile-tests:
    name: Mobile App Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wagerproof-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wagerproof-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mobile tests
        run: npm test

  # Send email notification with test results
  notify:
    name: Email Results
    runs-on: ubuntu-latest
    needs: [web-tests, mobile-tests]
    if: always()
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: >-
            WagerProof Tests ${{ (needs.web-tests.result == 'success' && needs.mobile-tests.result == 'success') && '✅ ALL PASSED' || '❌ FAILED' }} — ${{ github.event_name == 'schedule' && 'Daily Run' || github.event_name }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: WagerProof Tests <${{ secrets.EMAIL_USERNAME }}>
          body: |
            WagerProof Daily Test Report
            ============================

            Web Tests:    ${{ needs.web-tests.result == 'success' && '✅ Passed' || '❌ Failed' }}
            Mobile Tests: ${{ needs.mobile-tests.result == 'success' && '✅ Passed' || '❌ Failed' }}

            Trigger: ${{ github.event_name }}
            Branch:  ${{ github.ref_name }}
            Commit:  ${{ github.sha }}

            View full results: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
