<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <rect width="1080" height="1920" fill="#0b1220"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="40%" r="80%">
      <stop offset="55%" stop-color="#0b1220" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#22c55e" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="greenBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#vignette)"/>
  <rect width="1080" height="1920" fill="url(#greenGlow)"/>

  <!-- Eyebrow -->
  <g transform="translate(540,300)" text-anchor="middle">
    <rect x="-220" y="-33" width="440" height="66" rx="33" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text y="12" fill="#86efac" font-size="30" font-weight="800" letter-spacing="6">THE TRUTH</text>
  </g>

  <!-- Title -->
  <text x="540" y="450" fill="#ffffff" font-size="62" font-weight="800" text-anchor="middle">Bet the team that</text>
  <text x="540" y="525" fill="#ffffff" font-size="62" font-weight="800" text-anchor="middle">DELIVERED the blowout</text>
  <text x="540" y="585" fill="#94a3b8" font-size="28" font-weight="500" text-anchor="middle">G1 won by 8+ runs → bet their G2 ML</text>

  <!-- The big stat -->
  <g transform="translate(540,750)" text-anchor="middle">
    <rect x="-460" y="0" width="920" height="380" rx="28" fill="#1e293b" opacity="0.5" stroke="#22c55e" stroke-width="3"/>
    <text x="0" y="80" fill="#cbd5e1" font-size="32" font-weight="700">G2 Win Rate</text>
    <text x="0" y="240" fill="#22c55e" font-size="220" font-weight="900" letter-spacing="-4">58.4%</text>
    <text x="0" y="320" fill="#94a3b8" font-size="28" font-weight="600">132 wins out of 226 G2 spots</text>
  </g>

  <!-- Stats panel -->
  <g transform="translate(540,1230)" text-anchor="middle">
    <rect x="-470" y="0" width="940" height="240" rx="20" fill="#1e293b" opacity="0.55" stroke="#334155" stroke-width="1.5"/>

    <text x="-300" y="80" fill="#94a3b8" font-size="24" font-weight="600" letter-spacing="2">SPOTS</text>
    <text x="-300" y="160" fill="#ffffff" font-size="62" font-weight="900">226</text>
    <text x="-300" y="200" fill="#94a3b8" font-size="20">over 3 seasons</text>

    <line x1="-130" y1="40" x2="-130" y2="200" stroke="#475569" stroke-width="1.5"/>

    <text x="50"  y="80"  fill="#94a3b8" font-size="24" font-weight="600" letter-spacing="2">UNITS</text>
    <text x="50"  y="160" fill="#22c55e" font-size="62" font-weight="900">+13.0</text>
    <text x="50"  y="200" fill="#94a3b8" font-size="20">flat $100 stake</text>

    <line x1="220" y1="40" x2="220" y2="200" stroke="#475569" stroke-width="1.5"/>

    <text x="370" y="80"  fill="#94a3b8" font-size="24" font-weight="600" letter-spacing="2">ROI</text>
    <text x="370" y="160" fill="#22c55e" font-size="62" font-weight="900">+5.77%</text>
    <text x="370" y="200" fill="#94a3b8" font-size="20">@ -110 juice</text>
  </g>

  <!-- Bottom callout -->
  <rect x="60" y="1640" width="960" height="180" rx="20" fill="#22c55e" opacity="0.18" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="1700" fill="#86efac" font-size="36" font-weight="800" text-anchor="middle">Books haven't caught up</text>
  <text x="540" y="1755" fill="#cbd5e1" font-size="28" font-weight="600" text-anchor="middle">Same line as a 5-run win, but</text>
  <text x="540" y="1790" fill="#cbd5e1" font-size="28" font-weight="600" text-anchor="middle">winners cover way more often</text>

</svg>
