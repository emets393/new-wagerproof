<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <rect width="1080" height="1920" fill="#0b1220"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="55%" stop-color="#0b1220" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
    <linearGradient id="goldBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="mutedBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#vignette)"/>

  <!-- Eyebrow -->
  <g transform="translate(540,250)" text-anchor="middle">
    <rect x="-260" y="-33" width="520" height="66" rx="33" fill="#facc15" opacity="0.2" stroke="#facc15" stroke-width="2"/>
    <text y="12" fill="#fde68a" font-size="28" font-weight="800" letter-spacing="4">NOT ALL BLOWOUTS ARE EQUAL</text>
  </g>

  <!-- Title -->
  <text x="540" y="380" fill="#ffffff" font-size="58" font-weight="800" text-anchor="middle">G2 win rate by</text>
  <text x="540" y="450" fill="#ffffff" font-size="58" font-weight="800" text-anchor="middle">G1 winner's price</text>
  <text x="540" y="510" fill="#94a3b8" font-size="26" font-weight="500" text-anchor="middle">After winning G1 by 8+ runs</text>

  <!-- Chart: 5 vertical bars -->
  <!-- Y axis: 0-80% over y=620-1300 (680 tall) → 8.5 per % -->
  <line x1="90"  y1="600" x2="90"   y2="1300" stroke="#1e293b" stroke-width="2"/>
  <line x1="90"  y1="1300" x2="990" y2="1300" stroke="#1e293b" stroke-width="2"/>
  <line x1="90"  y1="1130" x2="990" y2="1130" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="90"  y1="960"  x2="990" y2="960"  stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="90"  y1="790"  x2="990" y2="790"  stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="90"  y1="620"  x2="990" y2="620"  stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <text x="78" y="1308" fill="#64748b" font-size="20" text-anchor="end">0%</text>
  <text x="78" y="1138" fill="#64748b" font-size="20" text-anchor="end">20</text>
  <text x="78" y="968"  fill="#64748b" font-size="20" text-anchor="end">40</text>
  <text x="78" y="798"  fill="#64748b" font-size="20" text-anchor="end">60</text>
  <text x="78" y="628"  fill="#64748b" font-size="20" text-anchor="end">80</text>

  <!-- Coin-flip line at 50% (y=1300-50*8.5=875) -->
  <line x1="90" y1="875" x2="990" y2="875" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="10,8" opacity="0.7"/>
  <text x="985" y="865" fill="#94a3b8" font-size="20" font-weight="700" text-anchor="end">coin flip</text>

  <!-- 5 bars at x: 110, 290, 470, 650, 830 (width 130) -->

  <!-- Bar 1: Big fav 71.9% h=611 y=689 -->
  <rect x="110" y="689" width="130" height="611" fill="url(#mutedBar)" rx="6"/>
  <text x="175" y="670" fill="#ffffff" font-size="36" font-weight="800" text-anchor="middle">71.9%</text>

  <!-- Bar 2: Mod-heavy fav 58.7% h=499 y=801 -->
  <rect x="290" y="801" width="130" height="499" fill="url(#mutedBar)" rx="6"/>
  <text x="355" y="782" fill="#ffffff" font-size="36" font-weight="800" text-anchor="middle">58.7%</text>

  <!-- Bar 3: Moderate fav 66.7% h=567 y=733 ★ HIGHLIGHTED -->
  <rect x="470" y="733" width="130" height="567" fill="url(#goldBar)" rx="6" stroke="#ffffff" stroke-width="3"/>
  <text x="535" y="710" fill="#facc15" font-size="42" font-weight="900" text-anchor="middle">66.7%</text>

  <!-- Bar 4: Pick em 37.9% h=322 y=978 ⚠️ -->
  <rect x="650" y="978" width="130" height="322" fill="url(#redBar)" rx="6"/>
  <text x="715" y="959" fill="#f87171" font-size="36" font-weight="800" text-anchor="middle">37.9%</text>

  <!-- Bar 5: Underdog 50.0% h=425 y=875 -->
  <rect x="830" y="875" width="130" height="425" fill="url(#mutedBar)" rx="6"/>
  <text x="895" y="856" fill="#ffffff" font-size="36" font-weight="800" text-anchor="middle">50.0%</text>

  <!-- Bar labels below -->
  <g text-anchor="middle">
    <text x="175" y="1340" fill="#cbd5e1" font-size="19" font-weight="700">Big fav</text>
    <text x="175" y="1365" fill="#64748b" font-size="16">-200+</text>
    <text x="175" y="1390" fill="#86efac" font-size="20" font-weight="800">+5.0%</text>
    <text x="175" y="1412" fill="#64748b" font-size="13">n=32</text>

    <text x="355" y="1340" fill="#cbd5e1" font-size="19" font-weight="700">Mod-Heavy</text>
    <text x="355" y="1365" fill="#64748b" font-size="16">-150 to -199</text>
    <text x="355" y="1390" fill="#f87171" font-size="20" font-weight="800">-5.4%</text>
    <text x="355" y="1412" fill="#64748b" font-size="13">n=46</text>

    <text x="535" y="1340" fill="#facc15" font-size="20" font-weight="900">★ MODERATE</text>
    <text x="535" y="1365" fill="#94a3b8" font-size="16">-110 to -149</text>
    <text x="535" y="1392" fill="#4ade80" font-size="26" font-weight="900">+26.6%</text>
    <text x="535" y="1414" fill="#64748b" font-size="13">n=69</text>

    <text x="715" y="1340" fill="#fca5a5" font-size="19" font-weight="800">⚠ PICK'EM</text>
    <text x="715" y="1365" fill="#64748b" font-size="16">±109</text>
    <text x="715" y="1392" fill="#f87171" font-size="22" font-weight="900">-29.7%</text>
    <text x="715" y="1414" fill="#64748b" font-size="13">n=29</text>

    <text x="895" y="1340" fill="#cbd5e1" font-size="19" font-weight="700">Underdog</text>
    <text x="895" y="1365" fill="#64748b" font-size="16">+110+</text>
    <text x="895" y="1390" fill="#86efac" font-size="20" font-weight="800">+8.3%</text>
    <text x="895" y="1412" fill="#64748b" font-size="13">n=50</text>
  </g>

  <!-- Bottom callout -->
  <rect x="60" y="1530" width="960" height="180" rx="20" fill="#facc15" opacity="0.15" stroke="#facc15" stroke-width="2"/>
  <text x="540" y="1590" fill="#fde68a" font-size="34" font-weight="800" text-anchor="middle">Sweet spot: moderate favorites</text>
  <text x="540" y="1640" fill="#cbd5e1" font-size="26" font-weight="600" text-anchor="middle">They were supposed to win, dominated,</text>
  <text x="540" y="1675" fill="#cbd5e1" font-size="26" font-weight="600" text-anchor="middle">and books don't fully recalibrate for G2</text>

  <!-- Trap warning -->
  <rect x="60" y="1740" width="960" height="140" rx="20" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="2"/>
  <text x="540" y="1795" fill="#fca5a5" font-size="32" font-weight="800" text-anchor="middle">⚠️ Pick em blowouts = TRAP</text>
  <text x="540" y="1845" fill="#cbd5e1" font-size="24" font-weight="600" text-anchor="middle">Avoid &quot;hot streak&quot; carryover when G1 was a coin flip</text>

</svg>
