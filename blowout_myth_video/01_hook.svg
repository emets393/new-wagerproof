<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#1a0507"/>
      <stop offset="55%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#ef4444" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>
    <linearGradient id="mythGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#fde047"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="24" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>

  <!-- Eyebrow -->
  <g transform="translate(540,440)" text-anchor="middle">
    <rect x="-260" y="-40" width="520" height="80" rx="40" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="2.5"/>
    <text y="14" fill="#fca5a5" font-size="30" font-weight="800" letter-spacing="6">MLB BETTING TRUTH</text>
  </g>

  <!-- Main title -->
  <text x="540" y="700" fill="url(#titleGrad)" font-size="120" font-weight="900" text-anchor="middle" letter-spacing="-2" filter="url(#softShadow)">THE</text>
  <text x="540" y="850" fill="url(#mythGrad)" font-size="180" font-weight="900" text-anchor="middle" letter-spacing="-4" filter="url(#softShadow)">BOUNCE-</text>
  <text x="540" y="1020" fill="url(#mythGrad)" font-size="180" font-weight="900" text-anchor="middle" letter-spacing="-4" filter="url(#softShadow)">BACK MYTH</text>

  <!-- Subtitle -->
  <text x="540" y="1140" fill="#cbd5e1" font-size="40" font-weight="500" text-anchor="middle">Why teams that get blown out</text>
  <text x="540" y="1190" fill="#cbd5e1" font-size="40" font-weight="500" text-anchor="middle">DON'T come back the next day</text>

  <!-- Stat preview -->
  <g transform="translate(540,1380)" text-anchor="middle">
    <rect x="-440" y="0" width="880" height="280" rx="24" fill="#1e293b" opacity="0.55" stroke="#334155" stroke-width="1.5"/>
    <text x="0" y="80" fill="#94a3b8" font-size="28" font-weight="600" letter-spacing="3">REVENGE SPOT WIN RATE</text>
    <text x="0" y="200" fill="#ef4444" font-size="140" font-weight="900" letter-spacing="-2">45%</text>
    <text x="0" y="245" fill="#94a3b8" font-size="24" font-weight="600">of teams that got blown out</text>
  </g>

  <!-- Footer -->
  <text x="540" y="1820" fill="#64748b" font-size="22" font-weight="600" text-anchor="middle" letter-spacing="3">2023-2025  ·  WAGERPROOF DATA</text>
</svg>
