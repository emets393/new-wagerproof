<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#0a1530"/>
      <stop offset="55%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="nyGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#1e3a8a" stop-opacity="0.40"/>
      <stop offset="60%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pickGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#nyGlow)"/>

  <!-- Eyebrow -->
  <g transform="translate(540,300)" text-anchor="middle">
    <rect x="-220" y="-33" width="440" height="66" rx="33" fill="#facc15" opacity="0.2" stroke="#facc15" stroke-width="2"/>
    <text y="12" fill="#fde68a" font-size="30" font-weight="800" letter-spacing="6">TONIGHT'S PICK</text>
  </g>

  <!-- Yesterday recap card -->
  <g transform="translate(540,460)" text-anchor="middle">
    <rect x="-460" y="0" width="920" height="280" rx="24" fill="#1e293b" opacity="0.55" stroke="#475569" stroke-width="1.5"/>
    <text x="0" y="60" fill="#94a3b8" font-size="26" font-weight="600" letter-spacing="3">YESTERDAY · GAME 1</text>

    <!-- Score line -->
    <text x="-280" y="170" fill="#cbd5e1" font-size="36" font-weight="700" text-anchor="middle">YANKEES</text>
    <text x="-280" y="240" fill="#22c55e" font-size="80" font-weight="900" text-anchor="middle">12</text>

    <text x="0"    y="200" fill="#64748b" font-size="40" font-weight="500" text-anchor="middle">—</text>

    <text x="280"  y="170" fill="#cbd5e1" font-size="36" font-weight="700" text-anchor="middle">ASTROS</text>
    <text x="280"  y="240" fill="#94a3b8" font-size="80" font-weight="900" text-anchor="middle">4</text>
  </g>

  <!-- Blowout badge -->
  <g transform="translate(540,800)" text-anchor="middle">
    <rect x="-180" y="-40" width="360" height="80" rx="40" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="2"/>
    <text y="14" fill="#fca5a5" font-size="32" font-weight="900" letter-spacing="3">8-RUN BLOWOUT</text>
  </g>

  <!-- Down arrow visual -->
  <text x="540" y="900" fill="#facc15" font-size="60" text-anchor="middle">▼</text>

  <!-- THE PICK -->
  <g transform="translate(540,1100)" text-anchor="middle">
    <rect x="-490" y="-60" width="980" height="380" rx="32" fill="#facc15" opacity="0.12" stroke="#facc15" stroke-width="3"/>
    <text x="0" y="0" fill="#fde68a" font-size="32" font-weight="800" letter-spacing="4">TONIGHT · GAME 2</text>
    <text x="0" y="120" fill="url(#pickGrad)" font-size="120" font-weight="900" letter-spacing="-3" filter="url(#softShadow)">YANKEES</text>
    <text x="0" y="240" fill="url(#pickGrad)" font-size="160" font-weight="900" letter-spacing="-4" filter="url(#softShadow)">-1.5</text>
    <text x="0" y="290" fill="#cbd5e1" font-size="28" font-weight="600">@ Astros · Daikin Park</text>
  </g>

  <!-- Edge stats -->
  <g transform="translate(540,1610)" text-anchor="middle">
    <rect x="-470" y="0" width="940" height="180" rx="20" fill="#1e293b" opacity="0.55" stroke="#22c55e" stroke-width="1.5"/>
    <text x="-280" y="60" fill="#94a3b8" font-size="22" font-weight="600" letter-spacing="2">G2 WIN RATE</text>
    <text x="-280" y="130" fill="#22c55e" font-size="52" font-weight="900">58.4%</text>
    <line x1="-100" y1="30" x2="-100" y2="150" stroke="#475569" stroke-width="1.5"/>
    <text x="60"  y="60" fill="#94a3b8" font-size="22" font-weight="600" letter-spacing="2">3-YEAR ROI</text>
    <text x="60"  y="130" fill="#22c55e" font-size="52" font-weight="900">+5.77%</text>
    <line x1="220" y1="30" x2="220" y2="150" stroke="#475569" stroke-width="1.5"/>
    <text x="370" y="60" fill="#94a3b8" font-size="22" font-weight="600" letter-spacing="2">SPOTS</text>
    <text x="370" y="130" fill="#ffffff" font-size="52" font-weight="900">226</text>
  </g>

  <!-- Footer tagline -->
  <text x="540" y="1850" fill="#facc15" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="3">HISTORY'S ON OUR SIDE</text>
</svg>
