"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Get every new workspace ready to run. Two steps, chained:
#   1. conductor-setup.sh — materialize gitignored .env files from a single
#      secret source (the root checkout, or $WAGERPROOF_SECRETS_DIR). Without
#      this a fresh worktree has no .env and tooling can't boot — e.g. the
#      agents-v3 Trigger.dev worker fails with "supabaseUrl is required".
#   2. conductor-deps.sh — npm install the worktree's node projects (agents-v3),
#      since node_modules is gitignored. Without this `npm run dev` /
#      `npx trigger.dev dev` can't resolve their deps.
# See .conductor/README.md.
setup = "bash scripts/conductor-setup.sh && bash scripts/conductor-deps.sh"
