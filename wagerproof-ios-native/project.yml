# XcodeGen spec for the native Swift port of Wagerproof.
# Run `xcodegen generate` from this directory to (re)create Wagerproof.xcodeproj.
# The .xcodeproj is gitignored; project.yml is the source of truth.
#
# Migration plan: ../docs/wagerproof-migration/REBUILD_PLAN.md
# Native primitive catalog: see Honeydew's docs/swift-migration/07-native-interactions.md

name: Wagerproof

options:
  bundleIdPrefix: com.wagerproof
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  # Without this, XcodeGen unpacks Icon Composer .icon bundles (Xcode 26) into
  # their loose internal files (icon.json, Assets/*) instead of one atomic
  # resource, which makes actool unable to find "AppIcon" in the catalog.
  # https://github.com/yonaskolb/XcodeGen/issues/1556
  fileTypes:
    icon:
      file: true
      buildPhase: resources

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: 88DXY6L653
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  WagerproofKit:
    path: WagerproofKit
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    # 5.78.0+: older releases fail under Xcode 26 / Swift 6.2 (PaywallColor
    # synthesized memberwise init collision)
    from: 5.78.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0
  Mixpanel:
    url: https://github.com/mixpanel/mixpanel-swift
    from: 4.3.0

targets:
  Wagerproof:
    type: application
    platform: iOS
    sources:
      - path: Wagerproof
        excludes:
          - Configuration/**
          - Wagerproof.entitlements
          - Info.plist
    configFiles:
      Debug: Wagerproof/Configuration/Debug.xcconfig
      Release: Wagerproof/Configuration/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wagerproof.mobile
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Wagerproof/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Wagerproof/Wagerproof.entitlements
        # Simulator builds keep the App Group entitlement used by the widgets,
        # but strip device-only/team-prefixed capabilities that iOS 26's
        # simulator rejects with NSPOSIXErrorDomain 163.
        "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Development"
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - package: WagerproofKit
        product: WagerproofModels
      - package: WagerproofKit
        product: WagerproofServices
      - package: WagerproofKit
        product: WagerproofStores
      - package: WagerproofKit
        product: WagerproofDesign
      - package: WagerproofKit
        product: WagerproofSharedKit
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: Mixpanel
        product: Mixpanel
      - target: WagerProofWidgetExtension
        embed: true
        codeSign: true
    postCompileScripts:
      - name: Keep widget App Group entitlement on sim builds
        script: |
          if [ "${EFFECTIVE_PLATFORM_NAME}" = "-iphonesimulator" ]; then
            SIM_PLIST='<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>com.apple.security.application-groups</key><array><string>group.com.wagerproof.mobile</string></array></dict></plist>'
            for XCENT_FILE in "${TARGET_TEMP_DIR}/${PRODUCT_NAME}.app.xcent" "${TARGET_TEMP_DIR}/${PRODUCT_NAME}.app-Simulated.xcent"; do
              if [ -f "$XCENT_FILE" ]; then
                printf '%s' "$SIM_PLIST" > "$XCENT_FILE"
              fi
            done
          fi
        basedOnDependencyAnalysis: false

  WagerProofWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: WagerProofWidgetExtension
        excludes:
          - Info.plist
          - WagerProofWidgetExtension.entitlements
      - path: WagerproofKit/Sources/WagerproofDesign/Resources/PixelOffice
        includes:
          - avatar_*.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wagerproof.mobile.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WagerProofWidgetExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: WagerProofWidgetExtension/WagerProofWidgetExtension.entitlements
        SKIP_INSTALL: YES
        "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Development"
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - package: WagerproofKit
        product: WagerproofModels
    postCompileScripts:
      - name: Keep widget App Group entitlement on sim builds
        script: |
          if [ "${EFFECTIVE_PLATFORM_NAME}" = "-iphonesimulator" ]; then
            SIM_PLIST='<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>com.apple.security.application-groups</key><array><string>group.com.wagerproof.mobile</string></array></dict></plist>'
            for XCENT_FILE in "${TARGET_TEMP_DIR}/${PRODUCT_NAME}.appex.xcent" "${TARGET_TEMP_DIR}/${PRODUCT_NAME}.appex-Simulated.xcent"; do
              if [ -f "$XCENT_FILE" ]; then
                printf '%s' "$SIM_PLIST" > "$XCENT_FILE"
              fi
            done
          fi
        basedOnDependencyAnalysis: false

# Declared explicitly so `xcodegen generate` always emits a SHARED
# Wagerproof.xcscheme into xcshareddata/xcschemes/. Xcode Cloud can only
# archive a shared scheme — without this, ci_scripts/ci_post_clone.sh's
# regenerate leaves the project with no shared scheme, so the Archive action
# produces nothing and nothing reaches TestFlight. Archive uses Release.
schemes:
  Wagerproof:
    build:
      targets:
        Wagerproof: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
