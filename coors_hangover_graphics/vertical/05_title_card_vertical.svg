<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#140726"/>
      <stop offset="55%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%"  stop-color="#8b5cf6" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountainGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="24" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>

  <!-- Star field -->
  <g fill="#a78bfa" opacity="0.35">
    <circle cx="130"  cy="380" r="2"/>
    <circle cx="280"  cy="460" r="1.2"/>
    <circle cx="430"  cy="340" r="1.6"/>
    <circle cx="620"  cy="420" r="1.2"/>
    <circle cx="780"  cy="360" r="2"/>
    <circle cx="920"  cy="440" r="1.5"/>
    <circle cx="150"  cy="520" r="1"/>
    <circle cx="340"  cy="560" r="1.6"/>
    <circle cx="720"  cy="540" r="1.2"/>
    <circle cx="880"  cy="500" r="1"/>
  </g>

  <!-- Eyebrow badge -->
  <g transform="translate(540,430)" text-anchor="middle">
    <rect x="-300" y="-40" width="600" height="80" rx="40" fill="#8b5cf6" opacity="0.18" stroke="#8b5cf6" stroke-width="2.5"/>
    <text y="14" fill="#c4b5fd" font-size="30" font-weight="800" letter-spacing="8">WAGERPROOF DEEP DIVE</text>
  </g>

  <!-- Main Title -->
  <text x="540" y="720" fill="url(#titleGrad)" font-size="130" font-weight="900" text-anchor="middle" letter-spacing="-2" filter="url(#softShadow)">THE COORS</text>
  <text x="540" y="870" fill="url(#titleGrad)" font-size="130" font-weight="900" text-anchor="middle" letter-spacing="-2" filter="url(#softShadow)">FIELD</text>
  <text x="540" y="1030" fill="#facc15"         font-size="160" font-weight="900" text-anchor="middle" letter-spacing="-3" filter="url(#softShadow)">HANGOVER</text>

  <!-- Subtitle -->
  <text x="540" y="1130" fill="#cbd5e1" font-size="40" font-weight="500" text-anchor="middle">Why the Rockies cost you money</text>
  <text x="540" y="1180" fill="#cbd5e1" font-size="40" font-weight="500" text-anchor="middle">in their first two games on the road</text>

  <!-- Stats panel -->
  <g transform="translate(540,1320)" text-anchor="middle">
    <rect x="-480" y="0" width="960" height="280" rx="24" fill="#1e293b" opacity="0.55" stroke="#334155" stroke-width="1.5"/>

    <text x="-300" y="90" fill="#94a3b8" font-size="28" font-weight="600" letter-spacing="3">WIN RATE</text>
    <text x="-300" y="180" fill="#22c55e" font-size="84" font-weight="900">58.2%</text>

    <line x1="-100" y1="40" x2="-100" y2="240" stroke="#475569" stroke-width="1.5"/>

    <text x="100" y="90" fill="#94a3b8" font-size="28" font-weight="600" letter-spacing="3">ROI @ -110</text>
    <text x="100" y="180" fill="#22c55e" font-size="84" font-weight="900">+11.2%</text>

    <text x="0" y="245" fill="#facc15" font-size="28" font-weight="700">82 bets · 2023-2026</text>
  </g>

  <!-- Mountain silhouette at bottom -->
  <path d="M 0,1920 L 0,1800 L 140,1770 L 280,1740 L 440,1760 L 600,1720 L 760,1750 L 900,1710 L 1080,1750 L 1080,1920 Z"
    fill="url(#mountainGrad)" opacity="0.7"/>
</svg>
