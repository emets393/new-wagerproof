<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <rect width="1080" height="1920" fill="#0b1220"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="55%" stop-color="#0b1220" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
    <linearGradient id="greenBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="mutedBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#vignette)"/>

  <!-- Eyebrow -->
  <rect x="220" y="300" width="640" height="66" rx="33" fill="#facc15" opacity="0.2" stroke="#facc15" stroke-width="2"/>
  <text x="540" y="345" fill="#fde68a" font-size="28" font-weight="800" letter-spacing="3" text-anchor="middle">THE MARKET INEFFICIENCY</text>

  <!-- Title -->
  <text x="540" y="450" fill="#ffffff" font-size="64" font-weight="800" text-anchor="middle">UNDER win rate</text>
  <text x="540" y="525" fill="#ffffff" font-size="64" font-weight="800" text-anchor="middle">by opponent park</text>
  <text x="540" y="580" fill="#94a3b8" font-size="28" font-weight="500" text-anchor="middle">Not what you'd expect</text>

  <!-- Chart area: y 700-1500 -->
  <line x1="90" y1="700"  x2="90" y2="1500" stroke="#1e293b" stroke-width="2"/>
  <line x1="90" y1="1500" x2="990" y2="1500" stroke="#1e293b" stroke-width="2"/>

  <!-- Gridlines 20% / 40% / 60% / 80% -->
  <line x1="90" y1="1300" x2="990" y2="1300" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="90" y1="1100" x2="990" y2="1100" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="90" y1="900"  x2="990" y2="900"  stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="90" y1="700"  x2="990" y2="700"  stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <text x="78" y="1508" fill="#64748b" font-size="22" text-anchor="end">0%</text>
  <text x="78" y="1308" fill="#64748b" font-size="22" text-anchor="end">20</text>
  <text x="78" y="1108" fill="#64748b" font-size="22" text-anchor="end">40</text>
  <text x="78" y="908"  fill="#64748b" font-size="22" text-anchor="end">60</text>
  <text x="78" y="708"  fill="#64748b" font-size="22" text-anchor="end">80</text>

  <!-- Breakeven line @ 52.4% = y 976 -->
  <line x1="90" y1="976" x2="990" y2="976" stroke="#facc15" stroke-width="3" stroke-dasharray="10,10" opacity="0.85"/>
  <text x="985" y="966" fill="#facc15" font-size="22" font-weight="800" text-anchor="end">BE 52.4%</text>

  <!-- 4 bars at x: 120, 360, 600, 840 with width 160 -->
  <!-- Bar 1: Pitcher 56.5% → h=565, y=935 -->
  <rect x="120" y="935" width="160" height="565" fill="url(#mutedBar)" rx="8"/>
  <text x="200" y="915" fill="#ffffff" font-size="40" font-weight="800" text-anchor="middle">56.5%</text>

  <!-- Bar 2: Neutral 55.6% → h=556, y=944 -->
  <rect x="360" y="944" width="160" height="556" fill="url(#mutedBar)" rx="8"/>
  <text x="440" y="924" fill="#ffffff" font-size="40" font-weight="800" text-anchor="middle">55.6%</text>

  <!-- Bar 3: Slight hitter HIGHLIGHT 72.7% → h=727, y=773 -->
  <rect x="600" y="773" width="160" height="727" fill="url(#goldBar)" rx="8" stroke="#ffffff" stroke-width="4"/>
  <text x="680" y="755" fill="#facc15" font-size="44" font-weight="900" text-anchor="middle">72.7%</text>

  <!-- Bar 4: Extreme hitter LOSER 43.8% → h=438, y=1062 -->
  <rect x="840" y="1062" width="160" height="438" fill="url(#redBar)" rx="8"/>
  <text x="920" y="1042" fill="#f87171" font-size="40" font-weight="800" text-anchor="middle">43.8%</text>

  <!-- Bar labels below -->
  <g font-family="inherit" text-anchor="middle">
    <text x="200" y="1545" fill="#e2e8f0" font-size="26" font-weight="800">PITCHER</text>
    <text x="200" y="1575" fill="#e2e8f0" font-size="26" font-weight="800">PARK</text>
    <text x="200" y="1605" fill="#94a3b8" font-size="18">pf_runs ≤94</text>
    <text x="200" y="1635" fill="#86efac" font-size="26" font-weight="900">+7.9% ROI</text>
    <text x="200" y="1660" fill="#64748b" font-size="15">n=24</text>

    <text x="440" y="1545" fill="#e2e8f0" font-size="26" font-weight="800">NEUTRAL</text>
    <text x="440" y="1605" fill="#94a3b8" font-size="18">pf_runs 95-100</text>
    <text x="440" y="1635" fill="#86efac" font-size="26" font-weight="900">+6.1% ROI</text>
    <text x="440" y="1660" fill="#64748b" font-size="15">n=18</text>

    <text x="680" y="1545" fill="#facc15" font-size="26" font-weight="900">★ SLIGHT</text>
    <text x="680" y="1575" fill="#facc15" font-size="26" font-weight="900">HITTER</text>
    <text x="680" y="1605" fill="#94a3b8" font-size="18">pf_runs 101-105</text>
    <text x="680" y="1640" fill="#4ade80" font-size="32" font-weight="900">+38.8%</text>
    <text x="680" y="1660" fill="#64748b" font-size="15">n=24</text>

    <text x="920" y="1545" fill="#fca5a5" font-size="26" font-weight="800">EXTREME</text>
    <text x="920" y="1575" fill="#fca5a5" font-size="26" font-weight="800">HITTER</text>
    <text x="920" y="1605" fill="#94a3b8" font-size="18">pf_runs ≥106</text>
    <text x="920" y="1640" fill="#f87171" font-size="32" font-weight="900">-16.5%</text>
    <text x="920" y="1660" fill="#64748b" font-size="15">n=16</text>
  </g>

  <!-- Insight banner -->
  <rect x="60" y="1730" width="960" height="130" rx="16" fill="#facc15" opacity="0.15" stroke="#facc15" stroke-width="1.5"/>
  <text x="540" y="1785" fill="#fde68a" font-size="30" font-weight="800" text-anchor="middle">Market over-corrects at moderate hitter parks</text>
  <text x="540" y="1830" fill="#94a3b8" font-size="24" font-weight="600" text-anchor="middle">LAD · KC · LAA · MIA · WSH · PHI · ATL</text>

</svg>
