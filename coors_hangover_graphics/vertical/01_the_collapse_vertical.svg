<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <rect width="1080" height="1920" fill="#0b1220"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="55%" stop-color="#0b1220" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
    <linearGradient id="homeGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="fadeGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="troughGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="slateGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#vignette)"/>

  <!-- Eyebrow -->
  <rect x="340" y="300" width="400" height="66" rx="33" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="2"/>
  <text x="540" y="345" fill="#c4b5fd" font-size="30" font-weight="800" letter-spacing="4" text-anchor="middle">THE COLLAPSE</text>

  <!-- Title -->
  <text x="540" y="450" fill="#ffffff" font-size="64" font-weight="800" text-anchor="middle">Rockies OPS</text>
  <text x="540" y="525" fill="#ffffff" font-size="64" font-weight="800" text-anchor="middle">by game of road trip</text>
  <text x="540" y="580" fill="#94a3b8" font-size="30" font-weight="500" text-anchor="middle">2023-2026 · 512 games</text>

  <!-- Chart area: x 100-980, y 700-1500 -->
  <!-- Y-axis -->
  <line x1="100" y1="700" x2="100" y2="1500" stroke="#1e293b" stroke-width="2"/>
  <line x1="100" y1="1500" x2="980" y2="1500" stroke="#1e293b" stroke-width="2"/>

  <!-- Gridlines at OPS .000, .200, .400, .600, .800 -->
  <line x1="100" y1="1500" x2="980" y2="1500" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="1300" x2="980" y2="1300" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="100" y1="1100" x2="980" y2="1100" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="100" y1="900"  x2="980" y2="900"  stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="100" y1="700"  x2="980" y2="700"  stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>

  <text x="85" y="1508" fill="#64748b" font-size="24" text-anchor="end">.000</text>
  <text x="85" y="1308" fill="#64748b" font-size="24" text-anchor="end">.200</text>
  <text x="85" y="1108" fill="#64748b" font-size="24" text-anchor="end">.400</text>
  <text x="85" y="908"  fill="#64748b" font-size="24" text-anchor="end">.600</text>
  <text x="85" y="708"  fill="#64748b" font-size="24" text-anchor="end">.800</text>

  <!-- Bars: 5 vertical bars. width=140, x at 130, 290, 450, 610, 770 (centers 200, 360, 520, 680, 840). Base y=1500. scale 1000/0.8=1250 per OPS. -->
  <!-- Home .756: h=945, y=555 -->
  <rect x="130" y="555" width="140" height="945" fill="url(#homeGrad)" rx="8"/>
  <text x="200" y="530" fill="#ffffff" font-size="40" font-weight="800" text-anchor="middle">.756</text>
  <text x="200" y="1555" fill="#e2e8f0" font-size="32" font-weight="800" text-anchor="middle">HOME</text>
  <text x="200" y="1590" fill="#64748b" font-size="22" text-anchor="middle">256 games</text>

  <!-- G1 .616: h=770, y=730 -->
  <rect x="290" y="730" width="140" height="770" fill="url(#fadeGrad)" rx="8"/>
  <text x="360" y="705" fill="#ffffff" font-size="40" font-weight="800" text-anchor="middle">.616</text>
  <text x="360" y="1555" fill="#e2e8f0" font-size="32" font-weight="800" text-anchor="middle">G1</text>
  <text x="360" y="1590" fill="#64748b" font-size="22" text-anchor="middle">41 games</text>

  <!-- G2 .548: h=685, y=815 TROUGH -->
  <rect x="450" y="815" width="140" height="685" fill="url(#troughGrad)" rx="8" stroke="#facc15" stroke-width="4"/>
  <text x="520" y="790" fill="#facc15" font-size="44" font-weight="900" text-anchor="middle">.548</text>
  <text x="520" y="1555" fill="#facc15" font-size="32" font-weight="900" text-anchor="middle">★ G2</text>
  <text x="520" y="1590" fill="#94a3b8" font-size="22" text-anchor="middle">TROUGH</text>

  <!-- G3 .623: h=779, y=721 -->
  <rect x="610" y="721" width="140" height="779" fill="url(#fadeGrad)" rx="8" opacity="0.85"/>
  <text x="680" y="696" fill="#ffffff" font-size="40" font-weight="800" text-anchor="middle">.623</text>
  <text x="680" y="1555" fill="#e2e8f0" font-size="32" font-weight="800" text-anchor="middle">G3</text>
  <text x="680" y="1590" fill="#64748b" font-size="22" text-anchor="middle">41 games</text>

  <!-- RoR .647: h=809, y=691 -->
  <rect x="770" y="691" width="140" height="809" fill="url(#slateGrad)" rx="8"/>
  <text x="840" y="666" fill="#ffffff" font-size="40" font-weight="800" text-anchor="middle">.647</text>
  <text x="840" y="1555" fill="#e2e8f0" font-size="28" font-weight="800" text-anchor="middle">ROAD</text>
  <text x="840" y="1590" fill="#64748b" font-size="22" text-anchor="middle">99 games</text>

  <!-- Insight banner -->
  <rect x="60" y="1680" width="960" height="180" rx="16" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="540" y="1735" fill="#e9d5ff" font-size="32" font-weight="700" text-anchor="middle">Home → Game 2</text>
  <text x="540" y="1800" fill="#f87171" font-size="56" font-weight="900" text-anchor="middle">−208 OPS pts</text>
  <text x="540" y="1845" fill="#94a3b8" font-size="26" font-weight="600" text-anchor="middle">−2.23 runs/game · HR/game cut in half</text>

</svg>
