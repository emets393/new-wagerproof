<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <rect width="1080" height="1920" fill="#0b1220"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="55%" stop-color="#0b1220" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
    <linearGradient id="redBar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#vignette)"/>

  <!-- Eyebrow -->
  <rect x="220" y="300" width="640" height="66" rx="33" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="2"/>
  <text x="540" y="345" fill="#c4b5fd" font-size="28" font-weight="800" letter-spacing="3" text-anchor="middle">THE HR DISAPPEARING ACT</text>

  <!-- Title -->
  <text x="540" y="450" fill="#ffffff" font-size="62" font-weight="800" text-anchor="middle">Opposing starter</text>
  <text x="540" y="525" fill="#ffffff" font-size="62" font-weight="800" text-anchor="middle">HR/9 vs Rockies</text>
  <text x="540" y="580" fill="#94a3b8" font-size="30" font-weight="500" text-anchor="middle">Every year, without fail</text>

  <!-- Legend -->
  <g transform="translate(540,640)" text-anchor="middle">
    <rect x="-380" y="-24" width="52" height="52" rx="6" fill="url(#redBar)"/>
    <text x="-315" y="12" fill="#e2e8f0" font-size="28" font-weight="600" text-anchor="start">Post-home G1-2</text>
    <rect x="70"   y="-24" width="52" height="52" rx="6" fill="url(#blueBar)"/>
    <text x="135"  y="12" fill="#e2e8f0" font-size="28" font-weight="600" text-anchor="start">Rest of road</text>
  </g>

  <!-- 4 rows, one per season. Row height 240, starts at y=740. Each row: year label + 2 horizontal bars -->
  <!-- Bars start at x=220, max value 1.5 maps to width 740. scale = 740/1.5 = 493.33 per HR/9 -->

  <!-- 2023 -->
  <text x="100" y="820" fill="#e2e8f0" font-size="44" font-weight="900">2023</text>
  <rect x="220" y="770" width="345" height="50" fill="url(#redBar)" rx="6"/>
  <text x="585" y="810" fill="#ffffff" font-size="32" font-weight="800">0.70</text>
  <rect x="220" y="830" width="548" height="50" fill="url(#blueBar)" rx="6"/>
  <text x="790" y="870" fill="#ffffff" font-size="32" font-weight="800">1.11</text>
  <text x="100" y="900" fill="#f87171" font-size="26" font-weight="800">-37%</text>

  <!-- 2024 -->
  <text x="100" y="1020" fill="#e2e8f0" font-size="44" font-weight="900">2024</text>
  <rect x="220" y="970" width="291" height="50" fill="url(#redBar)" rx="6"/>
  <text x="531" y="1010" fill="#ffffff" font-size="32" font-weight="800">0.59</text>
  <rect x="220" y="1030" width="607" height="50" fill="url(#blueBar)" rx="6"/>
  <text x="849" y="1070" fill="#ffffff" font-size="32" font-weight="800">1.23</text>
  <text x="100" y="1100" fill="#f87171" font-size="26" font-weight="800">-52%</text>

  <!-- 2025 -->
  <text x="100" y="1220" fill="#e2e8f0" font-size="44" font-weight="900">2025</text>
  <rect x="220" y="1170" width="286" height="50" fill="url(#redBar)" rx="6"/>
  <text x="526" y="1210" fill="#ffffff" font-size="32" font-weight="800">0.58</text>
  <rect x="220" y="1230" width="548" height="50" fill="url(#blueBar)" rx="6"/>
  <text x="790" y="1270" fill="#ffffff" font-size="32" font-weight="800">1.11</text>
  <text x="100" y="1300" fill="#f87171" font-size="26" font-weight="800">-48%</text>

  <!-- 2026 -->
  <text x="100" y="1420" fill="#e2e8f0" font-size="44" font-weight="900">2026</text>
  <rect x="220" y="1370" width="380" height="50" fill="url(#redBar)" rx="6"/>
  <text x="620" y="1410" fill="#ffffff" font-size="32" font-weight="800">0.77</text>
  <rect x="220" y="1430" width="730" height="50" fill="url(#blueBar)" rx="6"/>
  <text x="720" y="1470" fill="#ffffff" font-size="32" font-weight="800">1.48</text>
  <text x="100" y="1500" fill="#f87171" font-size="26" font-weight="800">-48%</text>

  <!-- Insight banner -->
  <rect x="60" y="1700" width="960" height="160" rx="16" fill="#8b5cf6" opacity="0.18" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="540" y="1760" fill="#e9d5ff" font-size="36" font-weight="800" text-anchor="middle">~45% fewer HRs allowed</text>
  <text x="540" y="1810" fill="#facc15" font-size="42" font-weight="900" text-anchor="middle">EVERY SINGLE YEAR</text>
  <text x="540" y="1845" fill="#94a3b8" font-size="24" font-weight="600" text-anchor="middle">since 2023</text>

</svg>
