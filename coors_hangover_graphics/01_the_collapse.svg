<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#0b1220"/>

  <!-- Subtle vignette -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#0b1220" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="homeGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="fadeGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="troughGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="slateGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Eyebrow tag -->
  <rect x="120" y="70" width="240" height="44" rx="22" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="240" y="101" fill="#c4b5fd" font-size="22" font-weight="700" letter-spacing="2" text-anchor="middle">THE COLLAPSE</text>

  <!-- Title -->
  <text x="120" y="180" fill="#ffffff" font-size="64" font-weight="800">Rockies OPS by game of road trip</text>
  <text x="120" y="230" fill="#94a3b8" font-size="28" font-weight="500">512 regular-season games · 2023-2026 · source: mlb_team_batting_logs</text>

  <!-- Axis label -->
  <text x="120" y="985" fill="#64748b" font-size="20" font-weight="600">OPS</text>

  <!-- Gridlines -->
  <line x1="340"  y1="280" x2="340"  y2="910" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="660"  y1="280" x2="660"  y2="910" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="980"  y1="280" x2="980"  y2="910" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="1300" y1="280" x2="1300" y2="910" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="1620" y1="280" x2="1620" y2="910" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- x-axis labels -->
  <text x="340"  y="955" fill="#64748b" font-size="22" text-anchor="middle">.000</text>
  <text x="660"  y="955" fill="#64748b" font-size="22" text-anchor="middle">.200</text>
  <text x="980"  y="955" fill="#64748b" font-size="22" text-anchor="middle">.400</text>
  <text x="1300" y="955" fill="#64748b" font-size="22" text-anchor="middle">.600</text>
  <text x="1620" y="955" fill="#64748b" font-size="22" text-anchor="middle">.800</text>

  <!-- Bars: x = 340 + OPS * 1600 ; bar height = 90 -->
  <!-- Row 1: Home .756 -->
  <text x="320" y="340" fill="#e2e8f0" font-size="28" font-weight="700" text-anchor="end">HOME</text>
  <text x="320" y="370" fill="#64748b" font-size="18" text-anchor="end">256 games</text>
  <rect x="340" y="310" width="1210" height="70" fill="url(#homeGrad)" rx="6"/>
  <text x="1530" y="357" fill="#ffffff" font-size="40" font-weight="800" text-anchor="end">.756</text>

  <!-- Row 2: G1 .616 -->
  <text x="320" y="470" fill="#e2e8f0" font-size="28" font-weight="700" text-anchor="end">AWAY G1</text>
  <text x="320" y="500" fill="#64748b" font-size="18" text-anchor="end">41 games</text>
  <rect x="340" y="440" width="986"  height="70" fill="url(#fadeGrad)" rx="6"/>
  <text x="1306" y="487" fill="#ffffff" font-size="40" font-weight="800" text-anchor="end">.616</text>

  <!-- Row 3: G2 .548 TROUGH -->
  <text x="320" y="600" fill="#fca5a5" font-size="28" font-weight="800" text-anchor="end">AWAY G2</text>
  <text x="320" y="630" fill="#94a3b8" font-size="18" text-anchor="end">41 games</text>
  <rect x="340" y="570" width="877"  height="70" fill="url(#troughGrad)" rx="6" stroke="#facc15" stroke-width="3"/>
  <text x="1197" y="617" fill="#ffffff" font-size="40" font-weight="800" text-anchor="end">.548</text>
  <!-- Trough callout -->
  <g transform="translate(1250,580)">
    <rect x="0" y="0" width="230" height="50" rx="25" fill="#facc15"/>
    <text x="115" y="33" fill="#0b1220" font-size="22" font-weight="800" text-anchor="middle">★ THE TROUGH</text>
  </g>

  <!-- Row 4: G3 .623 -->
  <text x="320" y="730" fill="#e2e8f0" font-size="28" font-weight="700" text-anchor="end">AWAY G3</text>
  <text x="320" y="760" fill="#64748b" font-size="18" text-anchor="end">41 games</text>
  <rect x="340" y="700" width="997"  height="70" fill="url(#fadeGrad)" rx="6" opacity="0.85"/>
  <text x="1317" y="747" fill="#ffffff" font-size="40" font-weight="800" text-anchor="end">.623</text>

  <!-- Row 5: Rest of road .647 -->
  <text x="320" y="860" fill="#e2e8f0" font-size="28" font-weight="700" text-anchor="end">REST OF ROAD</text>
  <text x="320" y="890" fill="#64748b" font-size="18" text-anchor="end">99 games · baseline</text>
  <rect x="340" y="830" width="1035" height="70" fill="url(#slateGrad)" rx="6"/>
  <text x="1355" y="877" fill="#ffffff" font-size="40" font-weight="800" text-anchor="end">.647</text>

  <!-- Bottom insight -->
  <text x="120" y="1020" fill="#94a3b8" font-size="24" font-weight="600">Drop from Home → Game 2: <tspan fill="#f87171" font-weight="800">-208 OPS points</tspan>  ·  -2.23 runs per game  ·  HR/game: 1.12 → 0.66</text>

</svg>
