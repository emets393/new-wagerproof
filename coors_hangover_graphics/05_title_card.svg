<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#140726"/>
      <stop offset="55%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%"  stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountainGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Subtle star field -->
  <g fill="#a78bfa" opacity="0.35">
    <circle cx="180"  cy="120" r="1.5"/>
    <circle cx="340"  cy="190" r="1"/>
    <circle cx="520"  cy="90"  r="2"/>
    <circle cx="760"  cy="150" r="1"/>
    <circle cx="1020" cy="80"  r="1.5"/>
    <circle cx="1280" cy="180" r="1"/>
    <circle cx="1480" cy="110" r="2"/>
    <circle cx="1680" cy="170" r="1"/>
    <circle cx="1820" cy="90"  r="1.5"/>
  </g>

  <!-- Eyebrow badge -->
  <g transform="translate(960,245)" text-anchor="middle">
    <rect x="-320" y="-32" width="640" height="64" rx="32" fill="#8b5cf6" opacity="0.18" stroke="#8b5cf6" stroke-width="2"/>
    <text y="12" fill="#c4b5fd" font-size="28" font-weight="800" letter-spacing="6">A WAGERPROOF DEEP DIVE</text>
  </g>

  <!-- Main Title -->
  <text x="960" y="440" fill="url(#titleGrad)" font-size="140" font-weight="900" text-anchor="middle" letter-spacing="-2" filter="url(#softShadow)">THE COORS FIELD</text>
  <text x="960" y="580" fill="#facc15"         font-size="140" font-weight="900" text-anchor="middle" letter-spacing="-2" filter="url(#softShadow)">HANGOVER</text>

  <!-- Subtitle -->
  <text x="960" y="670" fill="#cbd5e1" font-size="36" font-weight="500" text-anchor="middle">Why the Rockies cost you money in their first two games on the road</text>

  <!-- Key stats bar -->
  <g transform="translate(960,790)" text-anchor="middle">
    <rect x="-780" y="0" width="1560" height="120" rx="16" fill="#1e293b" opacity="0.55" stroke="#334155" stroke-width="1"/>

    <text x="-520" y="48" fill="#94a3b8" font-size="20" font-weight="600" letter-spacing="2">WIN RATE</text>
    <text x="-520" y="96" fill="#22c55e" font-size="52" font-weight="900">58.2%</text>

    <line x1="-260" y1="20" x2="-260" y2="100" stroke="#475569" stroke-width="1"/>

    <text x="0" y="48"   fill="#94a3b8" font-size="20" font-weight="600" letter-spacing="2">ROI @ -110</text>
    <text x="0" y="96"   fill="#22c55e" font-size="52" font-weight="900">+11.2%</text>

    <line x1="260" y1="20" x2="260" y2="100" stroke="#475569" stroke-width="1"/>

    <text x="520" y="48" fill="#94a3b8" font-size="20" font-weight="600" letter-spacing="2">SAMPLE</text>
    <text x="520" y="96" fill="#ffffff" font-size="52" font-weight="900">82 BETS</text>
  </g>

  <!-- Mountain silhouette at bottom (kept below stats panel) -->
  <path d="M 0,1080 L 0,1010 L 160,990 L 300,970 L 480,985 L 640,965 L 820,980 L 960,955 L 1100,975 L 1260,960 L 1420,980 L 1580,965 L 1760,985 L 1920,970 L 1920,1080 Z"
    fill="url(#mountainGrad)" opacity="0.7"/>

  <!-- Footer -->
  <text x="960" y="1045" fill="#64748b" font-size="20" font-weight="500" text-anchor="middle" letter-spacing="3">2023-2026 · 512 GAMES ANALYZED · SOURCE: WAGERPROOF DATA</text>
</svg>
