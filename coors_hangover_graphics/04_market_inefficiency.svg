<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <rect width="1920" height="1080" fill="#0b1220"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#0b1220" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="greenBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="mutedBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Eyebrow -->
  <rect x="120" y="70" width="400" height="44" rx="22" fill="#facc15" opacity="0.2" stroke="#facc15" stroke-width="1.5"/>
  <text x="320" y="101" fill="#fde68a" font-size="22" font-weight="700" letter-spacing="2" text-anchor="middle">THE MARKET INEFFICIENCY</text>

  <!-- Title -->
  <text x="120" y="180" fill="#ffffff" font-size="58" font-weight="800">UNDER wins by opponent park type</text>
  <text x="120" y="230" fill="#94a3b8" font-size="28" font-weight="500">Rockies G1-2 post-home · sorted by park's run factor</text>

  <!-- Y-axis -->
  <line x1="260" y1="280" x2="260" y2="880" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="260" y1="880" x2="1720" y2="880" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Gridlines every 20% -->
  <line x1="260" y1="730" x2="1720" y2="730" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="260" y1="580" x2="1720" y2="580" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="260" y1="430" x2="1720" y2="430" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="260" y1="280" x2="1720" y2="280" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>

  <text x="240" y="888" fill="#64748b" font-size="22" text-anchor="end">0%</text>
  <text x="240" y="738" fill="#64748b" font-size="22" text-anchor="end">20%</text>
  <text x="240" y="588" fill="#64748b" font-size="22" text-anchor="end">40%</text>
  <text x="240" y="438" fill="#64748b" font-size="22" text-anchor="end">60%</text>
  <text x="240" y="288" fill="#64748b" font-size="22" text-anchor="end">80%</text>
  <text x="145" y="600" fill="#64748b" font-size="22" font-weight="600" transform="rotate(-90 145 600)">UNDER Win Rate</text>

  <!-- Breakeven line @ 52.4% = y 487 -->
  <line x1="260" y1="487" x2="1720" y2="487" stroke="#facc15" stroke-width="3" stroke-dasharray="10,10" opacity="0.85"/>
  <text x="1700" y="478" fill="#facc15" font-size="22" font-weight="700" text-anchor="end">Breakeven @ -110 · 52.4%</text>

  <!-- Bars: x start at 360, width 240, gap 80 -->
  <!-- Bar 1: Pitcher park, 56.5%, +7.9% ROI, n=24 -->
  <rect x="360"  y="456.25" width="240" height="423.75" fill="url(#mutedBar)" rx="6"/>
  <text x="480"  y="440" fill="#ffffff" font-size="44" font-weight="800" text-anchor="middle">56.5%</text>
  <text x="480"  y="915" fill="#e2e8f0" font-size="26" font-weight="800" text-anchor="middle">PITCHER PARK</text>
  <text x="480"  y="942" fill="#94a3b8" font-size="20" text-anchor="middle">pf_runs ≤ 94 · n=24</text>
  <text x="480"  y="975" fill="#86efac" font-size="26" font-weight="800" text-anchor="middle">+7.9% ROI</text>
  <text x="480"  y="1005" fill="#64748b" font-size="18" text-anchor="middle">SF · SEA · SD · TEX · CLE · PIT · CHC</text>

  <!-- Bar 2: Neutral, 55.6%, +6.1%, n=18 -->
  <rect x="680"  y="463" width="240" height="417" fill="url(#mutedBar)" rx="6"/>
  <text x="800"  y="447" fill="#ffffff" font-size="44" font-weight="800" text-anchor="middle">55.6%</text>
  <text x="800"  y="915" fill="#e2e8f0" font-size="26" font-weight="800" text-anchor="middle">NEUTRAL</text>
  <text x="800"  y="942" fill="#94a3b8" font-size="20" text-anchor="middle">pf_runs 95-100 · n=18</text>
  <text x="800"  y="975" fill="#86efac" font-size="26" font-weight="800" text-anchor="middle">+6.1% ROI</text>
  <text x="800"  y="1005" fill="#64748b" font-size="18" text-anchor="middle">HOU · BAL · DET · NYY · TOR · CWS</text>

  <!-- Bar 3: Slight hitter (HIGHLIGHTED), 72.7%, +38.8%, n=24 -->
  <rect x="1000" y="334.75" width="240" height="545.25" fill="url(#goldBar)" rx="6" stroke="#ffffff" stroke-width="3"/>
  <text x="1120" y="318" fill="#facc15" font-size="50" font-weight="900" text-anchor="middle">72.7%</text>
  <text x="1120" y="915" fill="#facc15" font-size="26" font-weight="800" text-anchor="middle">★ SLIGHT HITTER</text>
  <text x="1120" y="942" fill="#94a3b8" font-size="20" text-anchor="middle">pf_runs 101-105 · n=24</text>
  <text x="1120" y="975" fill="#4ade80" font-size="32" font-weight="900" text-anchor="middle">+38.8% ROI</text>
  <text x="1120" y="1005" fill="#64748b" font-size="18" text-anchor="middle">LAD · KC · LAA · MIA · WSH · PHI · ATL</text>

  <!-- Bar 4: Extreme hitter (LOSER), 43.8%, -16.5%, n=16 -->
  <rect x="1320" y="551.5" width="240" height="328.5" fill="url(#redBar)" rx="6"/>
  <text x="1440" y="535" fill="#f87171" font-size="44" font-weight="800" text-anchor="middle">43.8%</text>
  <text x="1440" y="915" fill="#fca5a5" font-size="26" font-weight="800" text-anchor="middle">EXTREME HITTER</text>
  <text x="1440" y="942" fill="#94a3b8" font-size="20" text-anchor="middle">pf_runs ≥ 106 · n=16</text>
  <text x="1440" y="975" fill="#f87171" font-size="26" font-weight="800" text-anchor="middle">-16.5% ROI</text>
  <text x="1440" y="1005" fill="#64748b" font-size="18" text-anchor="middle">BOS · AZ · CIN</text>

  <!-- Insight annotation -->
  <g transform="translate(900,60)">
    <rect x="0" y="0" width="1000" height="0" fill="transparent"/>
  </g>

</svg>
